<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KTV 点歌台</title>
<style>
:root{--bg:#120b08;--bg2:#1e120d;--card:#2b1a12;--line:#68412e;--txt:#ffe4c2;--sub:#c8aa86;--pri:#ef6b3f;--pri2:#ff8a4a}
*{box-sizing:border-box}body{margin:0;color:var(--txt);font-family:"Noto Sans SC","Microsoft YaHei",sans-serif;background:radial-gradient(1000px 520px at 6% -10%,#4c2a1d88,transparent),linear-gradient(160deg,var(--bg),var(--bg2))}
.page{max-width:1780px;margin:0 auto;padding:14px;display:grid;gap:12px;grid-template-columns:1.05fr 1.6fr .95fr}
.card{background:linear-gradient(170deg,#352015cc,var(--card));border:1px solid var(--line);border-radius:12px;overflow:hidden}
.head{padding:10px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:#4a2d1f66}
.body{padding:12px}.row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
input{flex:1;min-width:0;padding:10px;border-radius:8px;border:1px solid var(--line);background:#1e120d;color:var(--txt)}
button{padding:9px 12px;border-radius:8px;border:1px solid transparent;background:linear-gradient(180deg,var(--pri2),var(--pri));color:#fff4e2;cursor:pointer;font-weight:600}
button.ghost{background:#3d271b;color:#ffd9ad;border-color:var(--line)}button.warn{background:#d69a3a;color:#2e1a10}
button:disabled{opacity:.5;cursor:not-allowed}
.status{font-size:12px;color:var(--sub);min-height:17px;word-break:break-all}
.list{max-height:360px;overflow:auto;display:grid;gap:8px}.item{border:1px solid var(--line);border-radius:10px;padding:8px;background:#1f120dcc}
.item.sel{border-color:#ff8f58;box-shadow:inset 0 0 0 1px #ff8f58}
.pager{display:flex;gap:6px;align-items:center;justify-content:flex-end;flex-wrap:wrap;margin-top:10px}
.pager button{padding:6px 10px;font-size:12px}
.pager .active{background:linear-gradient(180deg,var(--pri2),var(--pri));border-color:#ff8f58}
.result{display:grid;grid-template-columns:92px 1fr auto;gap:8px;align-items:center}.thumb{width:92px;height:52px;object-fit:cover;border-radius:6px;background:#2b1a12}
.t{font-size:14px;color:#ffd9ab;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.s{font-size:12px;color:var(--sub);margin-top:4px}
.player{display:grid;grid-template-columns:250px 1fr;gap:12px}.cover{width:100%;min-height:220px;object-fit:cover;border-radius:10px;border:1px solid var(--line);background:#1d110d}
h2{margin:0;font-size:32px;line-height:1.15}.meta{margin:8px 0 0;font-size:13px;color:var(--sub)}
.mode{display:flex;gap:8px;margin-top:10px}.mode button.active{background:linear-gradient(180deg,var(--pri2),var(--pri));border-color:#ff8f58}
.mix{display:grid;grid-template-columns:90px 1fr 48px;gap:8px;align-items:center;margin-top:8px}
.mix label{font-size:12px;color:var(--sub)}
.mix input[type=range]{width:100%}
audio{width:100%;margin-top:10px}.video{margin-top:10px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#000;display:flex;justify-content:center}
video{width:min(100%,1120px);min-height:500px;max-height:760px;display:block;object-fit:contain}
.tag{font-size:12px;background:#ffc484;color:#2a170b;border-radius:999px;padding:2px 9px;font-weight:700}
.toast{position:fixed;right:16px;bottom:16px;background:#2a1a12ee;border:1px solid #8c5b40;border-radius:8px;padding:8px 10px;opacity:0;transform:translateY(5px);transition:.2s}
.toast.show{opacity:1;transform:none}
@media(max-width:1320px){.page{grid-template-columns:1fr}.player{grid-template-columns:1fr}.cover{min-height:170px;max-height:300px}}
@media(max-width:580px){h2{font-size:24px}.result{grid-template-columns:80px 1fr}.result>div:last-child{grid-column:span 2}.thumb{width:80px;height:45px}video{min-height:220px}}
</style>
</head>
<body>
<main class="page">
<section>
<div class="card"><div class="head"><span>在线点歌</span></div><div class="body">
<div class="row"><input id="searchInput" value="青花瓷 周杰伦" placeholder="输入歌名 / 歌手关键词"><button id="searchBtn">搜索</button></div>
<div class="row"><button id="extractBtn" class="ghost">提取音视频</button><button id="separateBtn" class="ghost">分离伴奏</button><button id="vocalBtn" class="ghost">人声提取</button></div>
<div id="targetText" class="status">操作目标: 未选择</div><div id="statusText" class="status">ready</div>
</div></div>
<div class="card" style="margin-top:12px"><div class="head"><span>搜索结果</span><span id="resultCountText" class="tag">0</span></div><div class="body"><div id="resultList" class="list"></div><div id="resultPager" class="pager"></div></div></div>
<div class="card" style="margin-top:12px"><div class="head"><span>本地媒体库</span><button id="refreshLocalBtn" class="ghost">刷新</button></div><div class="body">
<div class="row"><input id="localSearchInput" placeholder="搜索本地歌曲"><button id="localSearchBtn" class="ghost">筛选</button></div>
<div id="localSearchStat" class="status">本地搜索: 全部</div><div id="localList" class="list"></div>
</div></div>
</section>
<section>
<div class="card"><div class="head"><span>演唱区</span><span id="queueHint" class="tag">队列: 0</span></div><div class="body">
<div class="player"><img id="coverImage" class="cover" src="https://via.placeholder.com/320x440/1a100d/f8ddb0?text=KTV" alt="cover"><div>
<h2 id="songTitle">等待点歌</h2><p id="songArtist" class="meta">请添加歌曲</p><p id="songStat" class="meta">播放量 - | 时长 -</p>
<div class="row"><button id="playFirstBtn">播放第一首</button><button id="nextBtn" class="ghost">切歌</button><button id="openBiliBtn" class="ghost">打开来源页</button></div>
<div class="mode"><button id="modeOriginalBtn">原唱</button><button id="modeAccompBtn" class="active">伴奏</button></div>
<div class="mix"><label>伴奏音量</label><input id="accompVolume" type="range" min="0" max="1.0" step="0.01" value="1.00"><span id="accompVal" class="status">100%</span></div>
<div class="mix"><label>人声音量</label><input id="vocalVolume" type="range" min="0" max="1.0" step="0.01" value="0.00"><span id="vocalVal" class="status">0%</span></div>
<audio id="ktvAudio" controls preload="metadata"></audio><div class="status">视频仅显示画面，声音统一走音频播放器，避免重音串音。</div>
<audio id="ktvVocal" preload="metadata" style="display:none"></audio>
</div></div>
<div class="video"><video id="ktvVideo" controls preload="metadata" muted playsinline></video></div>
</div></div>
</section>
<section><div class="card"><div class="head"><span>已点队列</span><span id="queueCountText" class="tag">0</span></div><div class="body"><div id="queueList" class="list"></div></div></div></section>
</main>
<div id="toast" class="toast"></div>
<script>
const $=id=>document.getElementById(id);

let currentResults=[],localItems=[],queue=[],currentSong=null,actionTargetSong=null,mediaMap={},currentMode="accomp",localSearchKeyword="",playToken=0,searchState={keyword:"",page:0,totalPages:1,totalResults:0,loading:false};
let vocalReady=false;
ktvVideo.muted=true;ktvVideo.volume=0;
const clean=t=>(t||"unknown").replace(/<[^>]*>/g,"");
const fmt=n=>Number(n||0).toLocaleString();
const npath=p=>(p||"").trim().toLowerCase();
const img=pic=>!pic?"https://via.placeholder.com/300x180/2a1a14/f8ddb0?text=No+Image":`/proxy/image?url=${encodeURIComponent(pic.startsWith("http")||pic.startsWith("//")?pic:"//"+pic.replace(/^\/\//,""))}`;
const furl=p=>p?`/api/local-file?path=${encodeURIComponent(p)}`:"";
const sk=s=>!s?"":(s.bvid||s.id||npath(s.audio_path||s.audioPath||"")||s.arcurl||`${clean(s.title||"")}_${s.author||""}`);
const mk=s=>!s?"":(s.bvid||s.id||npath(s.audio_path||s.audioPath||"")||npath(s.video_path||s.videoPath||"")||clean(s.title||""));
function tip(msg){toast.textContent=msg;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1700)}
function selected(s){return sk(s)&&sk(s)===sk(actionTargetSong)}
function setTarget(song,reason=""){if(!song)return;actionTargetSong={...song};targetText.textContent=`操作目标: ${clean(song.title||"unknown")}${reason?" | "+reason:""}`}
function getTarget(){return actionTargetSong||currentSong||queue[0]||currentResults[0]||localItems[0]||null}
function busy(b){searchBtn.disabled=b;extractBtn.disabled=b;separateBtn.disabled=b;vocalBtn.disabled=b;localSearchBtn.disabled=b}
async function createTask(url,payload){const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}),d=await r.json();if(!r.ok||!d.success)throw new Error(d.message||"create task failed");return d.task_id}

function ensureMedia(song){const key=mk(song),old=mediaMap[key]||{},merged={...old,audioPath:song.audio_path||song.audioPath||old.audioPath||"",videoPath:song.video_path||song.videoPath||old.videoPath||"",separatedPath:song.separated_path||song.separatedPath||old.separatedPath||"",vocalPath:song.vocal_path||song.vocalPath||old.vocalPath||"",coverPath:song.cover_path||song.coverPath||old.coverPath||""};mediaMap[key]=merged;if(song&&song.bvid)mediaMap[song.bvid]={...(mediaMap[song.bvid]||{}),...merged};return merged}
function playable(song){const m=ensureMedia(song);if(currentMode==="original"){return{audio:m.audioPath||m.separatedPath||"",vocal:"",video:m.videoPath||"",m,dual:false}}const dual=!!(m.separatedPath&&m.vocalPath);if(dual)return{audio:m.separatedPath,vocal:m.vocalPath,video:m.videoPath||"",m,dual:true};return{audio:m.separatedPath||m.audioPath||"",vocal:"",video:m.videoPath||"",m,dual:false}}
function stop(){playToken+=1;ktvAudio.pause();ktvVocal.pause();ktvVideo.pause()}
function clearVocalTrack(){ktvVocal.pause();ktvVocal.removeAttribute("src");ktvVocal.load();vocalReady=false}
function idle(){stop();ktvAudio.removeAttribute("src");ktvAudio.load();clearVocalTrack();ktvVideo.removeAttribute("src");ktvVideo.load();songTitle.textContent="等待点歌";songArtist.textContent="请添加歌曲";songStat.textContent="播放量 - | 时长 -"}
function sync(){if(!ktvVideo.src)return;const d=Math.abs((ktvVideo.currentTime||0)-(ktvAudio.currentTime||0));if(d>.35)ktvVideo.currentTime=ktvAudio.currentTime||0;if(ktvAudio.paused&&!ktvVideo.paused)ktvVideo.pause();if(ktvVocal.src){const dv=Math.abs((ktvVocal.currentTime||0)-(ktvAudio.currentTime||0));if(dv>.08)ktvVocal.currentTime=ktvAudio.currentTime||0;if(ktvAudio.paused&&!ktvVocal.paused)ktvVocal.pause()}}
function applyMixerVolumes(){ktvAudio.volume=Math.max(0,Math.min(1.0,Number(accompVolume.value||1)));ktvVocal.volume=Math.max(0,Math.min(1.0,Number(vocalVolume.value||0)));accompVal.textContent=`${Math.round(ktvAudio.volume*100)}%`;vocalVal.textContent=`${Math.round(ktvVocal.volume*100)}%`;if(ktvVocal.src){if(ktvVocal.volume>0&&(!ktvAudio.paused)&&ktvVocal.paused)ktvVocal.play().catch(()=>{});if(ktvVocal.volume===0&&(!ktvVocal.paused))ktvVocal.pause()}}
async function loadAudio(src,keep=0,restore=false){const tk=playToken;ktvAudio.pause();ktvAudio.src=furl(src);await new Promise((res,rej)=>{ktvAudio.addEventListener("loadedmetadata",()=>res(),{once:true});ktvAudio.addEventListener("error",()=>rej(new Error("音频加载失败")),{once:true})}).catch(e=>{if(tk===playToken)tip(e.message||"音频加载失败");throw e});if(tk!==playToken)return;const dur=Number(ktvAudio.duration||0),pos=dur>0?Math.min(keep,Math.max(dur-.05,0)):keep;ktvAudio.currentTime=Math.max(pos,0);if(restore){try{await ktvAudio.play()}catch(_){tip("音轨切换失败")}}}
async function loadVocal(src,keep=0,restore=false){if(!src){clearVocalTrack();return}const tk=playToken;vocalReady=false;ktvVocal.pause();ktvVocal.src=furl(src);const ok=await new Promise((res)=>{ktvVocal.addEventListener("loadedmetadata",()=>res(true),{once:true});ktvVocal.addEventListener("error",()=>res(false),{once:true})});if(!ok){clearVocalTrack();return}if(tk!==playToken)return;const dur=Number(ktvVocal.duration||0),pos=dur>0?Math.min(keep,Math.max(dur-.05,0)):keep;ktvVocal.currentTime=Math.max(pos,0);vocalReady=true;if(restore&&ktvVocal.volume>0){ktvVocal.play().catch(()=>{})}}
async function switchTrack(song){const p=playable(song);if(!p.audio)return;const tk=++playToken;const keep=Number(ktvAudio.currentTime||0),was=!ktvAudio.paused;if(p.dual){await loadAudio(p.audio,keep,false);if(tk!==playToken)return;await loadVocal(p.vocal,keep,false);if(tk!==playToken)return;applyMixerVolumes();if(was){await ktvAudio.play().catch(()=>{});if(Number(vocalVolume.value)>0&&ktvVocal.src)ktvVocal.play().catch(()=>{})}sync();return}if(currentMode==="accomp"&&!p.m.separatedPath)tip("该歌曲没有伴奏，已回退原唱");await loadAudio(p.audio,keep,was);if(tk!==playToken)return;await loadVocal("",0,false);if(tk!==playToken)return;applyMixerVolumes();sync()}
async function playSong(song){const p=playable(song);if(!p.audio){tip("当前歌曲没有可播放音频，请先提取或加载本地文件");return false}const tk=++playToken;ktvAudio.pause();clearVocalTrack();ktvVideo.pause();if(p.video){ktvVideo.src=furl(p.video);ktvVideo.muted=true;ktvVideo.volume=0}else{ktvVideo.removeAttribute("src");ktvVideo.load()}try{await loadAudio(p.audio,0,false);if(tk!==playToken)return false;if(p.dual){await loadVocal(p.vocal,0,false);applyMixerVolumes()}else{await loadVocal("",0,false);if(currentMode==="accomp"&&!p.m.separatedPath)tip("该歌曲没有伴奏，已回退原唱");applyMixerVolumes()}await ktvAudio.play();if(p.dual&&vocalReady&&Number(vocalVolume.value)>0)ktvVocal.play().catch(()=>{});if(ktvVideo.src){ktvVideo.currentTime=ktvAudio.currentTime||0;ktvVideo.play().catch(()=>{})}return true}catch(_){return false}}
function renderResults(){resultCountText.textContent=String(searchState.totalResults||currentResults.length);if(!currentResults.length){resultList.innerHTML='<div class="item">暂无结果</div>';return}resultList.innerHTML=currentResults.map((s,i)=>`<div class="item result ${selected(s)?"sel":""}"><img class="thumb" src="${img(s.pic)}" alt=""><div><div class="t">${clean(s.title)}</div><div class="s">${s.author||"unknown"} | ${s.duration||"0:00"} | ${fmt(s.play)}</div></div><div><button onclick="addToQueueFromSearch(${i})">点歌</button> <button class="ghost" onclick="selectFromSearch(${i})">设目标</button></div></div>`).join("")}
function renderPager(){if(!searchState.keyword||searchState.totalPages<=1){resultPager.innerHTML="";return}const p=searchState.page||1,total=searchState.totalPages;const pages=[];const start=Math.max(1,p-2),end=Math.min(total,p+2);for(let i=start;i<=end;i++)pages.push(i);const prevDisabled=p<=1?"disabled":"";const nextDisabled=p>=total?"disabled":"";resultPager.innerHTML=`<button class="ghost" ${prevDisabled} onclick="gotoPage(${p-1})">上一页</button>${pages.map(i=>`<button class="${i===p?"active":"ghost"}" onclick="gotoPage(${i})">${i}</button>`).join("")}<button class="ghost" ${nextDisabled} onclick="gotoPage(${p+1})">下一页</button>`}
function mergeLocal(items){const m=new Map();for(const s of(items||[])){const kb=s.bvid?`b:${s.bvid}`:"",ka=npath(s.audio_path||""),kt=clean(s.title||"").toLowerCase(),k=kb||(ka?`a:${ka}`:`t:${kt}`);if(!k)continue;const o=m.get(k);if(!o){m.set(k,{...s});continue}m.set(k,{...o,...s,bvid:o.bvid||s.bvid||"",title:o.title||s.title||"untitled",audio_path:o.audio_path||s.audio_path||"",video_path:o.video_path||s.video_path||"",separated_path:o.separated_path||s.separated_path||"",vocal_path:o.vocal_path||s.vocal_path||"",cover_path:o.cover_path||s.cover_path||"",work_dir:o.work_dir||s.work_dir||"",updated_at:Math.max(Number(o.updated_at||0),Number(s.updated_at||0))})}return [...m.values()].sort((a,b)=>Number(b.updated_at||0)-Number(a.updated_at||0))}
function renderLocal(){const kw=(localSearchKeyword||"").trim().toLowerCase(),arr=localItems.map((s,idx)=>({s,idx})).filter(({s})=>!kw||`${s.title||""} ${s.bvid||""}`.toLowerCase().includes(kw));localSearchStat.textContent=kw?`本地搜索: "${localSearchKeyword}" | ${arr.length}/${localItems.length}`:`本地搜索: 全部 | ${localItems.length} 条`;if(!arr.length){localList.innerHTML=`<div class="item">${kw?"本地未找到匹配歌曲":"暂无本地媒体"}</div>`;return}localList.innerHTML=arr.map(({s,idx})=>`<div class="item ${selected(s)?"sel":""}"><div class="t">${clean(s.title)}</div><div class="s">${s.video_path?"有视频":"无视频"} | ${s.separated_path?"有伴奏":"无伴奏"} | ${s.vocal_path?"有人声":"无人声"}</div><div class="row"><button class="ghost" onclick="addToQueueFromLocal(${idx})">加入队列</button><button class="ghost" onclick="selectFromLocal(${idx})">设目标</button><button class="warn" onclick="deleteLocalItem(${idx})">删除</button></div></div>`).join("")}
function renderQueue(){queueCountText.textContent=String(queue.length);queueHint.textContent=`队列: ${queue.length}`;if(!queue.length){queueList.innerHTML='<div class="item">队列为空</div>';return}queueList.innerHTML=queue.map((s,i)=>`<div class="item ${selected(s)?"sel":""}"><div class="t">${i+1}. ${clean(s.title)}</div><div class="s">${s.author||"local"} | ${s.duration||"--"}</div><div class="row"><button class="ghost" onclick="selectFromQueue(${i})">设目标</button><button class="ghost" onclick="pinSong(${i})">置顶</button><button class="warn" onclick="removeSong(${i})">删除</button></div></div>`).join("")}
function queueHas(song){const key=sk(song);return !!key&&queue.some(q=>sk(q)===key)}
function applySong(song){currentSong=song;setTarget(song,"当前播放");const m=ensureMedia(song);songTitle.textContent=clean(song.title||"unknown");songArtist.textContent=song.author||(song.source==="local_scan"?"本地文件":"unknown");songStat.textContent=`播放量 ${fmt(song.play)} | 时长 ${song.duration||"--"}`;coverImage.src=m.coverPath?furl(m.coverPath):img(song.pic||"");openBiliBtn.dataset.url=song.arcurl||""}
async function setMode(mode){currentMode=mode;modeOriginalBtn.classList.toggle("active",mode==="original");modeAccompBtn.classList.toggle("active",mode==="accomp");if(mode==="original"&&Number(vocalVolume.value)===0)vocalVolume.value="1.0";if(mode==="accomp"&&Number(vocalVolume.value)!==0)vocalVolume.value="0";applyMixerVolumes();if(currentSong)await switchTrack(currentSong)}
function playFirst(){if(!queue.length)return tip("队列为空");applySong(queue[0]);playSong(queue[0])}
function playNext(){if(!queue.length)return tip("队列为空");queue.shift();renderQueue();if(!queue.length){currentSong=null;idle();return}const next=queue[0];applySong(next);playSong(next).then(ok=>{if(ok)return;setTimeout(()=>{playSong(next)},180)})}
async function loadLocal(){try{const r=await fetch("/api/local-library"),d=await r.json();if(!d.success)throw new Error(d.message||"load local failed");localItems=mergeLocal(d.items||[]);localItems.forEach(it=>ensureMedia(it));renderLocal()}catch(e){localItems=[];renderLocal();tip(e.message||"加载本地媒体失败")}}
function search(page=1){const kw=searchInput.value.trim();if(!kw)return;if(searchState.loading)return;const reset=page===1||kw!==searchState.keyword;if(reset){searchState={keyword:kw,page:0,totalPages:1,totalResults:0,loading:false}}if(searchState.totalPages>0&&page>searchState.totalPages&&searchState.page>0)return;searchState.loading=true;statusText.textContent=`搜索中: ${kw} (第 ${page} 页)`;fetch(`/api/search?keyword=${encodeURIComponent(kw)}&page=${page}`).then(r=>r.json()).then(d=>{if(!d.success)throw new Error(d.message||"search failed");currentResults=d.videos||[];searchState.keyword=kw;searchState.page=Number(d.current_page||page);searchState.totalPages=Math.max(Number(d.total_pages||1),1);searchState.totalResults=Number(d.total_results||currentResults.length);renderResults();renderPager();statusText.textContent=`第 ${searchState.page}/${searchState.totalPages} 页，共 ${searchState.totalResults} 条`}).catch(e=>{if(page===1){currentResults=[];renderResults();renderPager()}statusText.textContent=e.message||"search failed"}).finally(()=>{searchState.loading=false})}
window.gotoPage=(page)=>{if(searchState.loading)return;if(page<1||page>searchState.totalPages)return;search(page)};
window.addToQueueFromSearch=i=>{const s=currentResults[i];if(!s)return;if(queueHas(s)){tip("队列里已存在该歌曲");setTarget(s,"已在队列");renderQueue();renderResults();return}queue.push({...s});setTarget(s,"来自搜索");renderQueue();renderResults();tip("已加入: "+clean(s.title));if(!currentSong)playFirst()};
window.addToQueueFromLocal=i=>{const s=localItems[i];if(!s)return;if(queueHas(s)){tip("队列里已存在该歌曲");setTarget(s,"已在队列");renderQueue();renderLocal();return}queue.push({...s,author:s.author||"local"});ensureMedia(s);setTarget(s,"来自本地");renderQueue();renderLocal();tip("已加入本地歌曲: "+clean(s.title));if(!currentSong)playFirst()};
window.selectFromSearch=i=>{const s=currentResults[i];if(!s)return;setTarget(s,"来自搜索");renderResults();renderQueue();renderLocal()};
window.selectFromLocal=i=>{const s=localItems[i];if(!s)return;setTarget(s,"来自本地");renderResults();renderQueue();renderLocal()};
window.selectFromQueue=i=>{const s=queue[i];if(!s)return;setTarget(s,"来自队列");renderResults();renderQueue();renderLocal()};
window.deleteLocalItem=async i=>{const s=localItems[i];if(!s)return;if(!window.confirm(`确认删除本地媒体？\n${clean(s.title)}`))return;try{const r=await fetch("/api/local-delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(s)}),d=await r.json();if(!r.ok||!d.success)throw new Error(d.message||"delete failed");tip("删除成功");if(actionTargetSong&&sk(actionTargetSong)===sk(s)){actionTargetSong=null;targetText.textContent="操作目标: 未选择"}queue=queue.filter(q=>sk(q)!==sk(s));renderQueue();loadLocal()}catch(e){tip(e.message||"删除失败")}};
window.pinSong=i=>{if(i<=0||i>=queue.length)return;const[s]=queue.splice(i,1);queue.unshift(s);renderQueue()};
window.removeSong=i=>{if(i<0||i>=queue.length)return;queue.splice(i,1);renderQueue()};
searchBtn.addEventListener("click",()=>search(1));searchInput.addEventListener("keypress",e=>{if(e.key==="Enter")search(1)});playFirstBtn.addEventListener("click",playFirst);nextBtn.addEventListener("click",playNext);refreshLocalBtn.addEventListener("click",loadLocal);localSearchBtn.addEventListener("click",()=>{localSearchKeyword=(localSearchInput.value||"").trim();renderLocal()});localSearchInput.addEventListener("keypress",e=>{if(e.key!=="Enter")return;localSearchKeyword=(localSearchInput.value||"").trim();renderLocal()});modeOriginalBtn.addEventListener("click",()=>setMode("original"));modeAccompBtn.addEventListener("click",()=>setMode("accomp"));
openBiliBtn.addEventListener("click",()=>{const url=openBiliBtn.dataset.url||"";if(!url)return tip("当前歌曲没有来源页");window.open(url,"_blank")});
extractBtn.addEventListener("click",async()=>{try{const song=getTarget();if(!song)return tip("请先搜索或选择歌曲");setTarget(song,"提取目标");statusText.textContent="创建提取任务...";const taskId=await createTask("/api/extract",{bvid:song.bvid||"",arcurl:song.arcurl||"",title:clean(song.title),pic:song.pic||""});pollTask(taskId,async task=>{const r=task.result||{},k=r.bvid||mk(song);mediaMap[k]={...(mediaMap[k]||{}),audioPath:r.audio_path||"",videoPath:r.video_path||"",separatedPath:r.separated_path||((mediaMap[k]||{}).separatedPath||""),vocalPath:r.vocal_path||((mediaMap[k]||{}).vocalPath||""),coverPath:r.cover_path||((mediaMap[k]||{}).coverPath||"")};if(r.bvid)mediaMap[r.bvid]={...(mediaMap[r.bvid]||{}),...mediaMap[k]};setTarget(song,"提取完成");statusText.textContent=r.from_cache?"已复用本地缓存":"提取完成";tip(r.from_cache?"命中本地缓存，跳过下载":"提取完成");await loadLocal();if(currentSong&&(sk(currentSong)===sk(song)||currentSong.bvid===r.bvid))await playSong(currentSong)})}catch(e){statusText.textContent=e.message||"extract create failed";tip(statusText.textContent)}});
separateBtn.addEventListener("click",async()=>{try{const song=getTarget();if(!song)return tip("请先选中队列歌曲");setTarget(song,"分离目标");const key=mk(song),m=mediaMap[key]||mediaMap[song.bvid||""]||{};if(!m.audioPath)return tip("请先提取或加载原唱音频");statusText.textContent="创建分离任务...";const taskId=await createTask("/api/separate",{bvid:song.bvid||"",title:clean(song.title),audio_path:m.audioPath});pollTask(taskId,async task=>{const r=task.result||{},k=r.bvid||key;mediaMap[k]={...(mediaMap[k]||{}),audioPath:r.input_audio||m.audioPath,videoPath:m.videoPath||"",separatedPath:r.output_audio||"",vocalPath:r.vocal_audio||((mediaMap[k]||{}).vocalPath||""),coverPath:m.coverPath||""};if(song.bvid)mediaMap[song.bvid]={...(mediaMap[song.bvid]||{}),...mediaMap[k]};statusText.textContent="分离完成";tip("分离完成");await loadLocal();if(currentSong&&sk(currentSong)===sk(song))await switchTrack(currentSong)})}catch(e){statusText.textContent=e.message||"separate create failed";tip(statusText.textContent)}});
vocalBtn.addEventListener("click",async()=>{try{const song=getTarget();if(!song)return tip("请先选中队列歌曲");setTarget(song,"人声目标");const key=mk(song),m=mediaMap[key]||mediaMap[song.bvid||""]||{};if(!m.audioPath)return tip("请先提取或加载原唱音频");statusText.textContent="创建人声提取任务...";const taskId=await createTask("/api/separate",{bvid:song.bvid||"",title:clean(song.title),audio_path:m.audioPath,vocal_only:true});pollTask(taskId,async task=>{const r=task.result||{},k=r.bvid||key;mediaMap[k]={...(mediaMap[k]||{}),audioPath:r.input_audio||m.audioPath,videoPath:m.videoPath||"",separatedPath:r.output_audio||((mediaMap[k]||{}).separatedPath||m.separatedPath||""),vocalPath:r.vocal_audio||((mediaMap[k]||{}).vocalPath||""),coverPath:m.coverPath||""};if(song.bvid)mediaMap[song.bvid]={...(mediaMap[song.bvid]||{}),...mediaMap[k]};statusText.textContent="人声提取完成";tip("人声提取完成");await loadLocal();if(currentSong&&sk(currentSong)===sk(song))await switchTrack(currentSong)})}catch(e){statusText.textContent=e.message||"vocal create failed";tip(statusText.textContent)}});
ktvAudio.addEventListener("ended",playNext);ktvAudio.addEventListener("play",()=>{if(vocalReady&&ktvVocal.src&&ktvVocal.paused&&Number(vocalVolume.value)>0)ktvVocal.play().catch(()=>{});if(!ktvVideo.src)return;ktvVideo.muted=true;ktvVideo.volume=0;ktvVideo.currentTime=ktvAudio.currentTime||0;ktvVideo.play().catch(()=>{})});ktvAudio.addEventListener("pause",()=>{if(ktvVocal.src&&!ktvVocal.paused)ktvVocal.pause();if(!ktvVideo.paused)ktvVideo.pause()});ktvAudio.addEventListener("timeupdate",sync);ktvAudio.addEventListener("seeking",()=>{if(vocalReady&&ktvVocal.src)ktvVocal.currentTime=ktvAudio.currentTime||0;if(ktvVideo.src)ktvVideo.currentTime=ktvAudio.currentTime||0});ktvVideo.addEventListener("play",()=>{if(!ktvAudio.src||!ktvAudio.paused)return;ktvAudio.play().catch(()=>{})});accompVolume.addEventListener("input",applyMixerVolumes);vocalVolume.addEventListener("input",applyMixerVolumes);
applyMixerVolumes();renderQueue();renderResults();renderPager();renderLocal();search(1);loadLocal();
</script>
